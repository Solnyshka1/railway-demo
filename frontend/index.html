<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Full-Stack App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1, h2 {
            margin-bottom: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        li {
            margin: 10px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Full-Stack App - Updated by CI/CD</h1>

    <h2>Add item</h2>
    <input id="input" placeholder="Enter text">
    <button onclick="addItem()">Add</button>

    <h2>Items</h2>
    <ul id="list"></ul>

    <script>
        const API = "https://railway-demo-production-314f.up.railway.app/api/data";

        async function loadItems() {
            try {
                const res = await fetch(API);
                const data = await res.json();

                const list = document.getElementById("list");
                list.innerHTML = "";

                data.forEach(item => {
                    const li = document.createElement("li");
                    li.innerHTML = item.name + " <button onclick='deleteItem(" + item.id + ")'>Delete</button>";
                    list.appendChild(li);
                });
            } catch (error) {
                console.error("Load error:", error);
            }
        }

        async function addItem() {
            const input = document.getElementById("input");
            const name = input.value.trim();

            if (!name) return;

            try {
                const res = await fetch(API, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name: name })
                });

                if (!res.ok) {
                    const text = await res.text();
                    console.error("POST failed:", text);
                    return;
                }

                input.value = "";
                loadItems();
            } catch (error) {
                console.error("Add error:", error);
            }
        }

        async function deleteItem(id) {
            try {
                const res = await fetch(API + "/" + id, {
                    method: "DELETE"
                });

                if (!res.ok) {
                    const text = await res.text();
                    console.error("DELETE failed:", text);
                    return;
                }

                loadItems();
            } catch (error) {
                console.error("Delete error:", error);
            }
        }

        loadItems();
    </script>
</body>
</html>
